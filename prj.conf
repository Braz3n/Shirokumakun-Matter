#
# Matter AC Controller — prj.conf
#

# --- Matter core ---
CONFIG_CHIP=y
CONFIG_PSA_WANT_ALG_PBKDF2_HMAC=y
CONFIG_PSA_WANT_ALG_HMAC=y
CONFIG_OPENTHREAD_MTD=y
CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y
CONFIG_CHIP_PROJECT_CONFIG="src/chip_project_config.h"
CONFIG_STD_CPP17=y

# Extended BLE advertising (improves commissioning reliability)
CONFIG_CHIP_BLE_EXT_ADVERTISING=y
CONFIG_CHIP_BLE_ADVERTISING_DURATION=60

# Device identity
# Vendor/Product IDs are Kconfig int → decimal
CONFIG_CHIP_DEVICE_VENDOR_ID=65521
CONFIG_CHIP_DEVICE_PRODUCT_ID=32769
CONFIG_CHIP_DEVICE_VENDOR_NAME="BRAZENRAKE"
CONFIG_CHIP_DEVICE_PRODUCT_NAME="IR AC Controller"
CONFIG_CHIP_DEVICE_SERIAL_NUMBER="MATTER-AC-001"
CONFIG_CHIP_DEVICE_SOFTWARE_VERSION=1
CONFIG_CHIP_DEVICE_SOFTWARE_VERSION_STRING="1.0.0"
# Discriminator and passcode are derived at runtime from the FICR hardware ID
# by HwPairing::Init() — these Kconfig values are fallback placeholders only.
CONFIG_CHIP_DEVICE_DISCRIMINATOR=0xF00
CONFIG_CHIP_DEVICE_SPAKE2_PASSCODE=20202021

# --- OpenThread features required for Matter commissioning ---
# SLAAC: auto-configure OMR address from the HomePod's on-mesh prefix so SRP
# registers the OMR address (not just ML-EID). Without this the iPhone (Wi-Fi)
# cannot reach the device via the HomePod's backbone router and CASE never starts.
CONFIG_OPENTHREAD_SLAAC=y

# --- Features we do NOT need ---
CONFIG_CHIP_OTA_REQUESTOR=n
CONFIG_CHIP_NFC_ONBOARDING_PAYLOAD=n
CONFIG_CHIP_FACTORY_DATA_NONE=y
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_DK_LIBRARY=n

# --- Bluetooth ---
CONFIG_BT_DEVICE_NAME="MatterAC"

# --- Logging via USB-CDC ---
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_RUNTIME_FILTERING=y

# --- USB-CDC shell (uses board's USB_DEVICE_STACK_NEXT default in NCS v3.3.0) ---
CONFIG_UART_LINE_CTRL=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_MATTER_LOG_LEVEL_ERR=y
CONFIG_SHELL_MINIMAL=n
CONFIG_LOG_CMDS=y
CONFIG_KERNEL_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL_CHECK_DTR=y
# Second CDC ACM instance for MCUmgr DFU on ACM1 (zephyr,uart-mcumgr in overlay)
CONFIG_CDC_ACM_SERIAL_MULTIPLE_INSTANCES=y

# --- I2C for SCD40 sensor ---
CONFIG_I2C=y

# --- PDM microphone + FFT-based CFAR ACK detector ---
CONFIG_NRFX_PDM=y
CONFIG_GPIO=y
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y

# --- Commissioning debug logging ---
# When debugging: uncomment all and set LOG_DEFAULT_LEVEL=3.
# Gives OpenThread join state machine + Matter CommissioningComplete /
# FailSafe / CASE session events. Raise LOG_BUFFER_SIZE for the verbosity.
CONFIG_LOG_DEFAULT_LEVEL=1
# CONFIG_LOG_DEFAULT_LEVEL=3
# CONFIG_OPENTHREAD_DEBUG=y
# CONFIG_OPENTHREAD_LOG_LEVEL_INFO=y
# CONFIG_LOG_BUFFER_SIZE=16384
# CONFIG_MATTER_LOG_LEVEL_INF=y

# --- Stack / safety ---
CONFIG_THREAD_NAME=y
CONFIG_MPU_STACK_GUARD=y
CONFIG_RESET_ON_FATAL_ERROR=n

# --- SMP/MCUmgr for DFU over USB-CDC ACM1 ---
CONFIG_MCUMGR=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_IMG_MANAGER=y
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH=y
CONFIG_SETTINGS=y
CONFIG_BASE64=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_TRANSPORT_UART_MTU=2048
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=2048
CONFIG_UART_MCUMGR_RX_BUF_SIZE=512
CONFIG_UART_MCUMGR_RX_BUF_COUNT=8
